services:
  mariadb:
    image: mariadb:11.4
    container_name: relia-mariadb
    restart: unless-stopped
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - relia-mariadb-data:/var/lib/mysql
  redis:
    image: redis:7.4-alpine
    container_name: relia-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--appendonly", "yes"]
    volumes:
      - relia-redis-data:/data

volumes:
  relia-mariadb-data:
  relia-redis-data: