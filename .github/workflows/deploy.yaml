name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: ghcr.io/beyond-sw-camp/relia-be

concurrency:
  group: relia-production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Load GHCR credentials from SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          GHCR_USERNAME_SSM_PARAMETER: ${{ vars.GHCR_USERNAME_SSM_PARAMETER }}
          GHCR_TOKEN_SSM_PARAMETER: ${{ vars.GHCR_TOKEN_SSM_PARAMETER }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"

          GHCR_USERNAME="$(aws ssm get-parameter --region "${AWS_REGION}" --with-decryption --name "${GHCR_USERNAME_SSM_PARAMETER}" --query 'Parameter.Value' --output text)"
          GHCR_TOKEN="$(aws ssm get-parameter --region "${AWS_REGION}" --with-decryption --name "${GHCR_TOKEN_SSM_PARAMETER}" --query 'Parameter.Value' --output text)"

          {
            printf 'GHCR_USERNAME=%s\n' "${GHCR_USERNAME}"
            printf 'GHCR_TOKEN=%s\n' "${GHCR_TOKEN}"
            printf 'IMAGE_TAG=%s\n' "${SHORT_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Build bootJar
        run: ./gradlew clean bootJar --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Create CodeDeploy bundle
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_ENV_SSM_PARAMETER: ${{ vars.APP_ENV_SSM_PARAMETER }}
          GHCR_USERNAME_SSM_PARAMETER: ${{ vars.GHCR_USERNAME_SSM_PARAMETER }}
          GHCR_TOKEN_SSM_PARAMETER: ${{ vars.GHCR_TOKEN_SSM_PARAMETER }}
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="${SHORT_SHA}"

          BUNDLE_DIR="${RUNNER_TEMP}/codedeploy-bundle"
          ARCHIVE_PATH="${RUNNER_TEMP}/codedeploy-${GITHUB_SHA}.zip"

          rm -rf "${BUNDLE_DIR}" "${ARCHIVE_PATH}"
          mkdir -p "${BUNDLE_DIR}/deployment"

          rsync -a ./ "${BUNDLE_DIR}/" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".gradle" \
            --exclude ".idea" \
            --exclude ".agents" \
            --exclude "build" \
            --exclude "deployment/nginx"

          {
            printf 'AWS_REGION=%s\n' "${AWS_REGION}"
            printf 'IMAGE_NAME=%s\n' "${IMAGE_NAME}"
            printf 'IMAGE_TAG=%s\n' "${IMAGE_TAG}"
            printf 'APP_ENV_SSM_PARAMETER=%s\n' "${APP_ENV_SSM_PARAMETER}"
            printf 'GHCR_USERNAME_SSM_PARAMETER=%s\n' "${GHCR_USERNAME_SSM_PARAMETER}"
            printf 'GHCR_TOKEN_SSM_PARAMETER=%s\n' "${GHCR_TOKEN_SSM_PARAMETER}"
          } > "${BUNDLE_DIR}/deployment/release.env"

          cd "${BUNDLE_DIR}"
          zip -qr "${ARCHIVE_PATH}" .

      - name: Upload bundle to S3
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          CODEDEPLOY_S3_BUCKET: ${{ vars.CODEDEPLOY_S3_BUCKET }}
          CODEDEPLOY_S3_KEY_PREFIX: ${{ vars.CODEDEPLOY_S3_KEY_PREFIX }}
        run: |
          set -euo pipefail

          S3_KEY="${CODEDEPLOY_S3_KEY_PREFIX:-codedeploy}/releases/${GITHUB_SHA}.zip"
          aws s3 cp "${RUNNER_TEMP}/codedeploy-${GITHUB_SHA}.zip" "s3://${CODEDEPLOY_S3_BUCKET}/${S3_KEY}" --region "${AWS_REGION}"
          echo "S3_KEY=${S3_KEY}" >> "${GITHUB_ENV}"

      - name: Create CodeDeploy deployment
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          CODEDEPLOY_APPLICATION_NAME: ${{ vars.CODEDEPLOY_APPLICATION_NAME }}
          CODEDEPLOY_DEPLOYMENT_GROUP: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP }}
          CODEDEPLOY_S3_BUCKET: ${{ vars.CODEDEPLOY_S3_BUCKET }}
        run: |
          set -euo pipefail

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --region "${AWS_REGION}" \
            --application-name "${CODEDEPLOY_APPLICATION_NAME}" \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --description "GitHub Actions deployment ${GITHUB_SHA}" \
            --revision "revisionType=S3,s3Location={bucket=${CODEDEPLOY_S3_BUCKET},key=${S3_KEY},bundleType=zip}" \
            --query "deploymentId" \
            --output text)

          echo "Created deployment ${DEPLOYMENT_ID}"
          aws deploy wait deployment-successful --region "${AWS_REGION}" --deployment-id "${DEPLOYMENT_ID}"
