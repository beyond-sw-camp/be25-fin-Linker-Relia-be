server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: relia
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4.1-mini

app:
  monthly-closing:
    cron: "0 0 3 1 * *"
    zone: "Asia/Seoul"

jwt:
  issuer: ${JWT_ISSUER}
  secret: ${JWT_SECRET_KEY}
  accessExpiredMs: ${JWT_ACCESS_EXPIRED_MS}
  refreshExpiredMs: ${JWT_REFRESH_EXPIRED_MS}

clova:
  stt:
    api-key: ${CLOVA_STT_API_KEY}
    invoke-url: ${CLOVA_STT_INVOKE_URL}

storage:
  ncp:
    endpoint: ${NCP_STORAGE_ENDPOINT}
    region: ${NCP_STORAGE_REGION}
    access-key: ${NCP_STORAGE_ACCESS_KEY}
    secret-key: ${NCP_STORAGE_SECRET_KEY}
    bucket: ${NCP_STORAGE_BUCKET}
    presigned-url-expiration-minutes: 10
    consultation-audio-prefix: consultation-audio/
